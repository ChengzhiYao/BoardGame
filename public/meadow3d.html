<!doctype html><html lang="zh"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>童话草原 · 活场景</title>
<style>
*{margin:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#cfe7ea;font-family:Georgia,serif}
#cv{position:fixed;inset:0;z-index:1;width:100%;height:100%;display:block}

</style></head>
<body>
<canvas id="cv"></canvas><div id="err"></div>
<script src="./three.min.js"></script>
<script src="./three-bloom.js"></script>
<script>
try{
if(typeof THREE==='undefined') throw new Error('Three.js 未加载');
var rnd=function(a,b){return a+Math.random()*(b-a);};
var rint=function(a,b){return (a+Math.random()*(b-a))|0;};
var cv=document.getElementById('cv');
var renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.86;
var scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0xcfe7ea,0.0072);
var camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,700);camera.position.set(0,4.6,14);
function M(c,o){return new THREE.MeshStandardMaterial(Object.assign({color:c,roughness:1},o||{}));}
function Mf(c){return new THREE.MeshStandardMaterial({color:c,roughness:1,flatShading:true});}
function enableShadow(o){o.traverse(function(m){if(m.isMesh){m.castShadow=true;}});}
// 灯光
var hemi=new THREE.HemisphereLight(0xcfeaff,0x4a6a36,0.85);scene.add(hemi);
var sun=new THREE.DirectionalLight(0xfff1d4,1.35);sun.position.set(-46,64,28);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=1;sun.shadow.camera.far=220;
sun.shadow.camera.left=-70;sun.shadow.camera.right=70;sun.shadow.camera.top=70;sun.shadow.camera.bottom=-70;sun.shadow.bias=-0.0004;sun.shadow.normalBias=0.04;
scene.add(sun);scene.add(sun.target);
var amb=new THREE.AmbientLight(0xffffff,0.22);scene.add(amb);
// 地形
function gy(x,z){return Math.sin(x*0.04)*0.8+Math.cos(z*0.045)*0.6+Math.sin(x*0.1+z*0.06)*0.22;}
function cvtex(w,draw){var c=document.createElement('canvas');c.width=c.height=w;draw(c.getContext('2d'),w);var t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
function splat(g,w,n,cols,smin,smax,amin,amax){for(var i=0;i<n;i++){g.fillStyle=cols[(Math.random()*cols.length)|0];g.globalAlpha=rnd(amin,amax);var s=rnd(smin,smax);g.beginPath();g.arc(Math.random()*w,Math.random()*w,s,0,7);g.fill();}g.globalAlpha=1;}
var groundTex=cvtex(1024,function(g,w){g.fillStyle='#4f922f';g.fillRect(0,0,w,w);splat(g,w,1400,['#3f7d28','#5aa036','#356b22','#62ad3c'],6,26,0.25,0.7);splat(g,w,500,['#7a6a3a','#8a7642','#6a5a30'],4,16,0.15,0.45);splat(g,w,2200,['#2e5a1c','#67b340'],1,4,0.2,0.6);splat(g,w,260,['#e7d24a','#ff7aa8','#ffffff'],1.2,3,0.5,0.9);});
groundTex.repeat.set(10,10);
var groundBump=cvtex(512,function(g,w){g.fillStyle='#808080';g.fillRect(0,0,w,w);splat(g,w,2400,['#aaa','#555','#ccc','#444'],1,7,0.4,0.9);});groundBump.repeat.set(10,10);
var gGeo=new THREE.PlaneGeometry(320,300,140,140);gGeo.rotateX(-Math.PI/2);
var gp=gGeo.attributes.position;for(var i=0;i<gp.count;i++){gp.setY(i,gy(gp.getX(i),gp.getZ(i)));}gGeo.computeVertexNormals();
var ground=new THREE.Mesh(gGeo,M(0x4f922f,{map:groundTex,bumpMap:groundBump,bumpScale:0.5}));ground.receiveShadow=true;scene.add(ground);
// 天穹（带太阳光晕）
var sunDir=new THREE.Vector3(-0.5,0.62,0.3).normalize();
var skyUni={top:{value:new THREE.Color(0x3f7fc6)},bot:{value:new THREE.Color(0xe6f1e0)},sun:{value:sunDir.clone()},glow:{value:1.0}};
var skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,fog:false,uniforms:skyUni,
 vertexShader:'varying vec3 vp;void main(){vp=normalize(position);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
 fragmentShader:'uniform vec3 top;uniform vec3 bot;uniform vec3 sun;uniform float glow;varying vec3 vp;void main(){float h=clamp(vp.y*1.15+0.12,0.0,1.0);vec3 col=mix(bot,top,h);float s=pow(max(dot(normalize(vp),normalize(sun)),0.0),60.0);col+=vec3(1.0,0.92,0.72)*s*glow*0.9;float halo=pow(max(dot(normalize(vp),normalize(sun)),0.0),8.0);col+=vec3(1.0,0.95,0.8)*halo*glow*0.18;gl_FragColor=vec4(col,1.0);}'});
var skyDome=new THREE.Mesh(new THREE.SphereGeometry(340,28,18),skyMat);scene.add(skyDome);
// 太阳圆盘（会被 bloom 点亮）
function dotTex(){return cvtex(64,function(g,w){var r=g.createRadialGradient(32,32,0,32,32,32);r.addColorStop(0,'#fff');r.addColorStop(1,'rgba(255,255,255,0)');g.fillStyle=r;g.fillRect(0,0,w,w);});}
var dot=dotTex();
var sunS=new THREE.Sprite(new THREE.SpriteMaterial({map:dot,color:0xfff3d0,transparent:true,depthWrite:false,fog:false}));sunS.scale.set(26,26,1);sunS.position.copy(sunDir).multiplyScalar(200);sunS.position.y+=20;scene.add(sunS);
// 体积光柱
var rays=new THREE.Group();scene.add(rays);for(var ri=0;ri<5;ri++){var ray=new THREE.Mesh(new THREE.ConeGeometry(4+ri,80,8,1,true),new THREE.MeshBasicMaterial({color:0xfff0c8,transparent:true,opacity:0.03,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide,fog:false}));ray.position.set(-60+ri*6,40,-30);ray.rotation.z=0.35;ray.rotation.x=0.1;rays.add(ray);}
// 地平线树线 + 远山
var horizon=new THREE.Group();scene.add(horizon);
for(var hi=0;hi<150;hi++){var a=(hi/150)*6.28;var rad=rnd(120,150);var hx=Math.cos(a)*rad,hz=Math.sin(a)*rad;var ht=new THREE.Mesh(new THREE.ConeGeometry(rnd(3,6),rnd(10,22),5),Mf(0x274d22));ht.position.set(hx,gy(hx,hz)+6,hz);horizon.add(ht);}
var hills=new THREE.Mesh(new THREE.SphereGeometry(90,24,12,0,6.28,0,1.05),Mf(0x3a6b34));hills.position.set(20,-30,-120);hills.scale.set(2.2,0.5,1);scene.add(hills);
// === 细密草（锥化叶片 + 逐株色变 + 风） ===
function bladeGeo(){var g=new THREE.PlaneGeometry(0.12,1,1,4);g.translate(0,0.5,0);var p=g.attributes.position;for(var i=0;i<p.count;i++){var y=p.getY(i);p.setX(i,p.getX(i)*(1.0-y*0.72));p.setZ(i,p.getZ(i)+y*y*0.18);}g.computeVertexNormals();return g;}
var grassMat=new THREE.ShaderMaterial({side:THREE.DoubleSide,uniforms:{time:{value:0},amb:{value:0.55}},
 vertexShader:'uniform float time;attribute vec3 aCol;varying float vy;varying vec3 vc;void main(){vy=uv.y;vc=aCol;vec4 wp=instanceMatrix*vec4(position,1.0);float ph=wp.x*0.4+wp.z*0.4;float w=(sin(time*1.5+ph)+0.4*sin(time*3.1+ph*1.7))*0.16*uv.y;wp.x+=w;wp.z+=w*0.5;gl_Position=projectionMatrix*modelViewMatrix*wp;}',
 fragmentShader:'uniform float amb;varying float vy;varying vec3 vc;void main(){vec3 base=vc*0.5;vec3 tip=vc*1.18+0.06;vec3 col=mix(base,tip,vy)*(amb+0.5*vy);gl_FragColor=vec4(col,1.0);}'});
function makeGrass(n,rangeMin,rangeMax,hmin,hmax){var geo=bladeGeo();var im=new THREE.InstancedMesh(geo,grassMat,n);var col=new Float32Array(n*3);var m=new THREE.Matrix4(),q=new THREE.Quaternion(),e=new THREE.Euler(),v=new THREE.Vector3(),sc=new THREE.Vector3();var palette=[[0.30,0.52,0.16],[0.36,0.6,0.2],[0.24,0.44,0.14],[0.46,0.64,0.24],[0.54,0.56,0.22]];
 for(var i=0;i<n;i++){var x=rnd(rangeMin,rangeMax),z=rnd(rangeMin*0.86,rangeMax*0.6);e.set(0,rnd(0,6.28),0);q.setFromEuler(e);sc.set(rnd(0.8,1.3),rnd(hmin,hmax),1);v.set(x,gy(x,z),z);m.compose(v,q,sc);im.setMatrixAt(i,m);var c=palette[(Math.random()*palette.length)|0];var j=rnd(0.85,1.12);col[i*3]=c[0]*j;col[i*3+1]=c[1]*j;col[i*3+2]=c[2]*j;}
 geo.setAttribute('aCol',new THREE.InstancedBufferAttribute(col,3));return im;}
scene.add(makeGrass(12000,-72,72,0.32,0.7));
scene.add(makeGrass(2400,-46,46,0.7,1.3));
// === 花 / 灌木 / 石 / 蘑菇 / 木桩 / 蒲公英 ===
function flower(x,z,col){var g=new THREE.Group();var stem=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,rnd(0.7,1.2),5),Mf(0x3f7d2a));stem.position.y=stem.geometry.parameters.height/2;g.add(stem);var ph=stem.geometry.parameters.height;var center=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),Mf(0xffd24a));center.position.y=ph;g.add(center);for(var k=0;k<6;k++){var pa=(k/6)*6.28;var pet=new THREE.Mesh(new THREE.SphereGeometry(0.14,7,7),Mf(col));pet.scale.set(0.5,0.22,1);pet.position.set(Math.cos(pa)*0.2,ph,Math.sin(pa)*0.2);pet.lookAt(center.position.x+Math.cos(pa),ph,center.position.z+Math.sin(pa));g.add(pet);}g.position.set(x,gy(x,z),z);g.rotation.y=rnd(0,6.28);enableShadow(g);return g;}
var FL=[0xff6f8f,0xffe14d,0xffffff,0xb98cff,0xff8a3a,0xff5e5e];
for(var fl=0;fl<150;fl++){var fx=rnd(-50,50),fz=rnd(-44,24);scene.add(flower(fx,fz,FL[(Math.random()*FL.length)|0]));}
function bush(x,z,s){var g=new THREE.Group();var lm=Mf(rnd(0,1)>0.5?0x3a7d34:0x356e2c);for(var k=0;k<7;k++){var b=new THREE.Mesh(new THREE.SphereGeometry(rnd(0.7,1.2)*s,8,7),lm);b.position.set(rnd(-1,1)*s,rnd(0.4,1.1)*s,rnd(-1,1)*s);g.add(b);}if(rnd(0,1)>0.5){for(var bz=0;bz<5;bz++){var berry=new THREE.Mesh(new THREE.SphereGeometry(0.1,6,6),Mf(0xb02a3a));berry.position.set(rnd(-1,1)*s,rnd(0.6,1.2)*s,rnd(-1,1)*s);g.add(berry);}}g.position.set(x,gy(x,z),z);enableShadow(g);return g;}
for(var bu=0;bu<22;bu++){var bx=rnd(-58,58),bz2=rnd(-48,18);scene.add(bush(bx,bz2,rnd(0.8,1.6)));}
function rock(x,z,s){var g=new THREE.Group();var r=new THREE.Mesh(new THREE.IcosahedronGeometry(s,0),Mf(0x7c7d80));r.scale.set(1,rnd(0.6,0.9),1);r.position.y=s*0.5;g.add(r);var moss=new THREE.Mesh(new THREE.SphereGeometry(s*0.96,8,6,0,6.28,0,1.0),Mf(0x4a7d34));moss.position.y=s*0.5;moss.scale.set(1,0.5,1);g.add(moss);g.position.set(x,gy(x,z),z);g.rotation.y=rnd(0,6.28);enableShadow(g);return g;}
for(var rk=0;rk<16;rk++){var rx=rnd(-56,56),rz=rnd(-46,16);scene.add(rock(rx,rz,rnd(0.6,1.6)));}
function mushroom(x,z){var g=new THREE.Group();var st=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,0.4,6),Mf(0xefe6d2));st.position.y=0.2;g.add(st);var cap=new THREE.Mesh(new THREE.SphereGeometry(0.22,9,7,0,6.28,0,1.57),Mf(rnd(0,1)>0.5?0xc23a2a:0xb0793a));cap.position.y=0.42;cap.scale.y=0.7;g.add(cap);g.position.set(x,gy(x,z),z);enableShadow(g);return g;}
for(var mk=0;mk<26;mk++){var mx=rnd(-50,50),mz=rnd(-44,18);scene.add(mushroom(mx,mz));}
function log(x,z){var g=new THREE.Group();var lo=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.45,rnd(3,5),9),Mf(0x5a3d22));lo.rotation.z=1.57;g.add(lo);var moss=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.42,lo.geometry.parameters.height*0.7,9,1,true),Mf(0x4a7d34));moss.rotation.z=1.57;g.add(moss);g.position.set(x,gy(x,z)+0.4,z);g.rotation.y=rnd(0,6.28);enableShadow(g);return g;}
scene.add(log(-26,-6));scene.add(log(32,-18));
function dandelion(x,z){var s=new THREE.Sprite(new THREE.SpriteMaterial({map:dot,color:0xf2f6ee,transparent:true,opacity:0.9,depthWrite:false}));s.scale.set(0.7,0.7,1);s.position.set(x,gy(x,z)+1.0,z);scene.add(s);}
for(var dk=0;dk<40;dk++){dandelion(rnd(-50,50),rnd(-44,20));}
// === 树 / 大橡树 / 柳树 ===
function tree(x,z,s,kind){var g=new THREE.Group();var bark=Mf(0x523722);var tr=new THREE.Mesh(new THREE.CylinderGeometry(0.45*s,0.75*s,4*s,8),bark);tr.position.y=2*s;g.add(tr);for(var br=0;br<3;br++){var b=new THREE.Mesh(new THREE.CylinderGeometry(0.12*s,0.22*s,2.2*s,6),bark);b.position.set(rnd(-0.6,0.6)*s,rnd(3,4.2)*s,rnd(-0.6,0.6)*s);b.rotation.set(rnd(-0.6,0.6),0,rnd(-0.6,0.6));g.add(b);}
 var greens=[0x3f7d34,0x356e2c,0x4a8a3a,0x2f6326];
 if(kind==='willow'){for(var w2=0;w2<22;w2++){var dr=new THREE.Mesh(new THREE.CylinderGeometry(0.04*s,0.02*s,rnd(3,5)*s,4),Mf(0x6a9a44));var aa=(w2/22)*6.28;dr.position.set(Math.cos(aa)*2.4*s,4.5*s,Math.sin(aa)*2.4*s);dr.rotation.x=0.2;g.add(dr);}var cap=new THREE.Mesh(new THREE.SphereGeometry(3*s,10,8),Mf(0x4a8a3a));cap.position.y=5.5*s;cap.scale.y=0.7;g.add(cap);}
 else{for(var c2=0;c2<(kind==='oak'?9:5);c2++){var lm=Mf(greens[(Math.random()*greens.length)|0]);var bb=new THREE.Mesh(new THREE.SphereGeometry(rnd(1.7,2.8)*s,10,8),lm);bb.position.set(rnd(-2,2)*s,rnd(4.4,6.4)*s,rnd(-2,2)*s);g.add(bb);}if(kind==='blossom'){for(var bl2=0;bl2<14;bl2++){var pk=new THREE.Mesh(new THREE.SphereGeometry(0.3*s,6,6),Mf(0xffc6da));pk.position.set(rnd(-2.2,2.2)*s,rnd(4.4,6.6)*s,rnd(-2.2,2.2)*s);g.add(pk);}}}
 g.position.set(x,gy(x,z),z);enableShadow(g);return g;}
scene.add(tree(-22,-18,2.6,'oak'));scene.add(tree(30,-30,1.6,'blossom'));scene.add(tree(-38,-34,1.4,'normal'));scene.add(tree(40,-14,1.2,'normal'));scene.add(tree(15,-6,1.4,'willow'));
// === 池塘（涟漪着色器）+ 睡莲 + 芦苇 ===
var waterMat=new THREE.ShaderMaterial({transparent:true,uniforms:{time:{value:0},c1:{value:new THREE.Color(0x2f6f9e)},c2:{value:new THREE.Color(0x7fc6da)}},
 vertexShader:'varying vec2 vu;void main(){vu=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
 fragmentShader:'uniform float time;uniform vec3 c1;uniform vec3 c2;varying vec2 vu;void main(){float r=sin((vu.x*34.0)+time*2.0)*0.5+cos((vu.y*28.0)-time*1.7)*0.5+sin((vu.x*12.0+vu.y*12.0)+time)*0.3;float m=0.5+0.22*r;vec3 col=mix(c1,c2,m);col+=smoothstep(0.78,1.0,m)*0.5;gl_FragColor=vec4(col,0.88);}'});
var pondX=22,pondZ=-8,pondY=gy(pondX,pondZ);
var pond=new THREE.Mesh(new THREE.CircleGeometry(8,40),waterMat);pond.rotation.x=-Math.PI/2;pond.position.set(pondX,pondY+0.1,pondZ);scene.add(pond);
for(var lp=0;lp<7;lp++){var pa2=rnd(0,6.28),pr=rnd(2,6);var pad=new THREE.Mesh(new THREE.CircleGeometry(rnd(0.5,0.9),12),Mf(0x357d3a));pad.rotation.x=-Math.PI/2;pad.position.set(pondX+Math.cos(pa2)*pr,pondY+0.16,pondZ+Math.sin(pa2)*pr);scene.add(pad);}
for(var rd=0;rd<40;rd++){var ra=rnd(0,6.28),rr=rnd(7.5,9.5);var rx2=pondX+Math.cos(ra)*rr,rz2=pondZ+Math.sin(ra)*rr;var reed=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.05,rnd(1.6,2.8),5),Mf(0x6a8f3a));reed.position.set(rx2,gy(rx2,rz2)+reed.geometry.parameters.height/2,rz2);scene.add(reed);if(rnd(0,1)>0.6){var cat=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.5,6),Mf(0x6a4a2a));cat.position.set(rx2,gy(rx2,rz2)+reed.geometry.parameters.height,rz2);scene.add(cat);}}
var warren=new THREE.Mesh(new THREE.SphereGeometry(3,16,12,0,6.28,0,1.57),Mf(0x6b5a3a));warren.position.set(-14,gy(-14,4),4);warren.scale.y=0.5;warren.castShadow=true;scene.add(warren);
var hole=new THREE.Mesh(new THREE.CircleGeometry(0.7,16),new THREE.MeshBasicMaterial({color:0x140d08}));hole.position.set(-12.4,gy(-12,5.6)+0.5,5.6);hole.rotation.x=-0.6;scene.add(hole);
// === 粒子：蝴蝶 / 蜻蜓 / 花粉 / 萤火 / 飞鸟 ===
function emojiSprite(e,sz){var c=document.createElement('canvas');c.width=c.height=64;var g=c.getContext('2d');g.font='48px serif';g.textAlign='center';g.textBaseline='middle';g.fillText(e,32,38);var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,fog:false}));sp.scale.set(sz,sz,1);return sp;}
var flies=[];for(var bi=0;bi<12;bi++){var b=emojiSprite('🦋',1.5);b.userData={cx:rnd(-30,30),cz:rnd(-30,8),ph:rnd(0,6.28),r:rnd(3,9)};flies.push(b);scene.add(b);}
var dragons=[];for(var dr2=0;dr2<6;dr2++){var dg=emojiSprite('🦗',1.0);dg.userData={ph:rnd(0,6.28),r:rnd(2,6)};dragons.push(dg);scene.add(dg);}
var birds=[];for(var bd=0;bd<5;bd++){var bird=emojiSprite('🐦',1.4);bird.userData={ph:rnd(0,6.28),sp:rnd(0.3,0.6),h:rnd(22,34)};birds.push(bird);scene.add(bird);}
var pollenG=new THREE.BufferGeometry();var PN=400,pa3=new Float32Array(PN*3);for(var pp=0;pp<PN;pp++){pa3[pp*3]=rnd(-60,60);pa3[pp*3+1]=rnd(0,14);pa3[pp*3+2]=rnd(-50,20);}pollenG.setAttribute('position',new THREE.BufferAttribute(pa3,3));
var pollen=new THREE.Points(pollenG,new THREE.PointsMaterial({map:dot,color:0xfff3c0,size:0.32,transparent:true,opacity:0.7,depthWrite:false,blending:THREE.AdditiveBlending}));scene.add(pollen);

// ====== 动物模型（保留并启用阴影） ======
var SPECS={
 rabbit:{kind:'quad',color:0xa88a5c,belly:0xe8dcc4,ear:'long',tail:'puff',legR:0.1,legLen:0.42,body:[0.66,0.64,0.98],head:0.42,snout:0.05,scale:1.0},
 mouse:{kind:'quad',color:0x8c8278,belly:0xcfc7ba,ear:'round',tail:'thin',legR:0.06,legLen:0.26,body:[0.5,0.48,0.9],head:0.42,snout:0.12,scale:0.6},
 sheep:{kind:'quad',color:0xeee7da,belly:0xe2dccf,ear:'side',tail:'short',face:0x3a352e,legColor:0x2f2c27,legR:0.1,legLen:0.6,body:[0.92,0.9,1.18],head:0.34,snout:0.07,wool:true,scale:1.06},

function pose(rig,action,t,moving){var s=rig.sp;
 if(rig.type==='quad'){var freq=action==='hunt'?13:action==='move'?7:action==='forage'?3:2;var amp=action==='hunt'?0.85:action==='move'?0.6:action==='forage'?0.22:0.05;
  rig.legs.forEach(function(lg){lg.group.rotation.x=Math.sin(t*freq+lg.phase)*amp;});
  var bob=(moving||action==='hunt')?Math.abs(Math.sin(t*freq))*0.1:Math.sin(t*2)*0.022;
  if(rig.torso)rig.torso.position.y=bob;
  if(rig.head){rig.head.rotation.x=action==='forage'?(0.55+Math.sin(t*4)*0.12):action==='rest'?0.32:Math.sin(t*1.5)*0.05;}
  if(rig.tail){rig.tail.rotation.y=Math.sin(t*(action==='idle'?2:6))*0.3;}
  if(rig.torso)rig.torso.scale.y+=((action==='rest'?0.72:1.0)-rig.torso.scale.y)*0.12;
 }else if(rig.type==='bird'){var bf=(action==='move'||action==='hunt')?12:action==='forage'?3:5;
  rig.wings.forEach(function(w){w.group.rotation.z=Math.sin(t*bf)*((action==='move'||action==='hunt')?1.0:0.25)*w.s*-1;});
  rig.root.position.y=(action==='move'||action==='hunt')?(rig.baseY+1.6+Math.sin(t*2)*0.3):rig.baseY+Math.abs(Math.sin(t*5))*0.25;
  if(rig.head)rig.head.rotation.x=action==='forage'?0.6:Math.sin(t*1.5)*0.1;
 }else if(rig.type==='snake'){rig.segs.forEach(function(sg,i){sg.position.x=Math.sin(t*4-i*0.6)*0.4*(action==='idle'?0.5:1);});if(rig.head)rig.head.position.x=Math.sin(t*4+0.6)*0.45;}}

function namePlate(txt,col,inv){var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:nameTex(txt,col),transparent:true,depthWrite:false,fog:false}));sp.scale.set(4.4*inv,1.24*inv,1);return sp;}
function ensurePlate(){if(!animalRig)return;if(playerPlate){animalRig.root.remove(playerPlate);playerPlate=null;}if(playerName){var S=(SPECS[animal.species]||SPECS.rabbit).scale*2.6;playerPlate=namePlate(playerName,'#ffe6a0',1/S);playerPlate.position.set(0,2.7,0);animalRig.root.add(playerPlate);}}
function setSpecies(key){if(animalRig)scene.remove(animalRig.root);animalRig=makeAnimal(key);animalRig.root.scale.setScalar((SPECS[key]||SPECS.rabbit).scale*2.6);scene.add(animalRig.root);playerPlate=null;ensurePlate();}
setSpecies('rabbit');
var critters=[];['fox','deer','sheep','squirrel','boar','mouse'].forEach(function(k){var r=makeAnimal(k);r.root.scale.setScalar(SPECS[k].scale*2.0);var cx=rnd(-42,42),cz=rnd(-42,-12);r.ud={x:cx,z:cz,ph:rnd(0,6),tx:cx,tz:cz,rt:0};r.root.position.set(cx,gy(cx,cz),cz);scene.add(r.root);critters.push(r);});

var LOCPOS={meadow:[0,2],warren:[-13,4],oak:[-21,-15],pond:[20,-7]};
var curLoc='meadow',night=false,season='夏';
var animal={x:0,z:2,tx:0,tz:2,heading:0,action:'idle',busy:false,t:0,retarget:0,species:'rabbit'};
var prey={x:0,z:-10};
if(!/embed/.test(location.search+location.hash)){
 var ZHN={rabbit:'兔',mouse:'鼠',sheep:'羊',squirrel:'松鼠',deer:'鹿',hedgehog:'刺猟',badger:'獭',boar:'野猪',fox:'狐',weasel:'黃鼠狼',wolf:'狼',lion:'狮',tiger:'虎',crow:'乌鸦',owl:'猫头鹰',hawk:'鹰',snake:'蛇'};
 var keys=Object.keys(SPECS),ki=0;
 var btn=document.createElement('div');btn.style.cssText='position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:9;background:rgba(20,32,20,.62);color:#eef;padding:9px 18px;border-radius:999px;font:15px Georgia;cursor:pointer;user-select:none;border:1px solid rgba(180,220,180,.4)';
 function upd(){btn.textContent='▶ '+ZHN[keys[ki]]+'（点击切换 '+(ki+1)+'/'+keys.length+'）';}
 btn.onclick=function(){ki=(ki+1)%keys.length;animal.species=keys[ki];setSpecies(keys[ki]);upd();};
 upd();document.body.appendChild(btn);
}
function kindOf(a){if(!a)return 'idle';if(/捕|猎/.test(a))return 'hunt';if(/休|歇|躲/.test(a))return 'rest';if(/迁|移|前往/.test(a))return 'move';return 'forage';}
var DAY={top:0x3f7fc6,bot:0xcfe4e0,sun:0xfff1d4,hemiS:0xcfeaff,hemiG:0x4a6a36,fog:0xcfe7ea,exp:0.86},NIGHT={top:0x0c1840,bot:0x223a4a,sun:0x9fb6e0,hemiS:0x2a3a6a,hemiG:0x202a24,fog:0x16233f,exp:0.9};
function applyEnv(){var p=night?NIGHT:DAY;
 skyUni.top.value.set(p.top);skyUni.bot.value.set(p.bot);skyUni.glow.value=night?0.4:1.0;
 sun.color.set(p.sun);sun.intensity=night?0.4:1.05;hemi.color.set(p.hemiS);hemi.groundColor.set(p.hemiG);hemi.intensity=night?0.4:0.6;amb.intensity=night?0.14:0.22;
 scene.fog.color.set(p.fog);renderer.toneMappingExposure=p.exp;sunS.material.color.set(night?0xdfe6ff:0xfff3d0);
 fireflies.material.opacity=night?0.85:0;pollen.material.opacity=night?0.2:0.7;
 grassMat.uniforms.amb.value=night?0.32:0.55;
 var sat=season==='秋'?0.7:season==='冬'?0.5:1.0;
}
applyEnv();
function setAction(a){animal.action=a||'idle';animal.t=0;animal.retarget=0;var lp=LOCPOS[curLoc]||[0,2];if(a==='hunt'){preyRig.root.visible=true;prey={x:lp[0]+rnd(-9,9),z:lp[1]-15};}else{preyRig.root.visible=false;}}
var othersGroup=new THREE.Group();scene.add(othersGroup);var otherRigs=[];var othersSig='';
function setOthers(list){if(!list)return;var sig=list.map(function(o){return o.species+'@'+o.location+'#'+o.name;}).join('|');if(sig===othersSig)return;othersSig=sig;
 otherRigs.forEach(function(r){othersGroup.remove(r.root);});otherRigs=[];
 list.slice(0,14).forEach(function(o){var lp=LOCPOS[o.location]||[0,2];var S=(SPECS[o.species]||SPECS.rabbit).scale*2.4;var rig=makeAnimal(o.species||'rabbit');rig.root.scale.setScalar(S);var ox=lp[0]+rnd(-8,8),oz=lp[1]+rnd(-6,6);rig.ud={x:ox,z:oz,ph:rnd(0,6),tx:ox,tz:oz,rt:0};rig.root.position.set(ox,gy(ox,oz),oz);
  var np=namePlate(o.name||'玩家','#bfe8ff',1/S);np.position.set(0,2.7,0);rig.root.add(np);othersGroup.add(rig.root);otherRigs.push(rig);});}
window.addEventListener('message',function(ev){var d=ev&&ev.data;if(!d||d.type!=='meadow')return;
 if(d.name&&d.name!==playerName){playerName=d.name;ensurePlate();}
 if(d.others)setOthers(d.others);
 if(d.species&&d.species!==animal.species){animal.species=d.species;setSpecies(d.species);}
 if(typeof d.night==='boolean')night=d.night;if(d.season)season=d.season;applyEnv();
 if(d.location&&LOCPOS[d.location]){curLoc=d.location;if(!d.busy){animal.tx=LOCPOS[d.location][0]+rnd(-2,2);animal.tz=LOCPOS[d.location][1];}}
 animal.busy=!!d.busy;setAction(d.busy?kindOf(d.action):'idle');});

// 后期：bloom + 暖色调色
var composer=null,bloom=null,grade=null;
try{composer=new THREE.EffectComposer(renderer);composer.addPass(new THREE.RenderPass(scene,camera));
 bloom=new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.3,0.7,0.85);composer.addPass(bloom);
 grade=new THREE.ShaderPass({uniforms:{tDiffuse:{value:null},time:{value:0},res:{value:new THREE.Vector2(innerWidth,innerHeight)}},
  vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:'uniform sampler2D tDiffuse;uniform float time;uniform vec2 res;varying vec2 vUv;float rand(vec2 c){return fract(sin(dot(c,vec2(12.9898,78.233)))*43758.5453);}void main(){vec2 uv=vUv;vec2 d=uv-0.5;float r=dot(d,d);vec3 col=texture2D(tDiffuse,uv).rgb;float l=dot(col,vec3(0.299,0.587,0.114));vec3 warm=vec3(1.04,1.0,0.94);col*=mix(vec3(0.98,1.0,1.02),warm,smoothstep(0.0,0.7,l));col=clamp((col-0.5)*1.06+0.52,0.0,1.0);col*=smoothstep(1.0,0.45,r*1.4);col+=(rand(uv*res*0.5+vec2(time))-0.5)*0.025;gl_FragColor=vec4(col,1.0);}'});
 composer.addPass(grade);}catch(e){composer=null;}

function placeRig(rig,x,z,heading,extraY){rig.root.position.set(x,gy(x,z)+(extraY||0),z);rig.root.rotation.y=heading;}
function tick(){requestAnimationFrame(tick);var t=performance.now()/1000;grassMat.uniforms.time.value=t;waterMat.uniforms.time.value=t;if(grade)grade.uniforms.time.value=t;
 flies.forEach(function(b){var u=b.userData;var x=u.cx+Math.cos(t*0.6+u.ph)*u.r,z=u.cz+Math.sin(t*0.8+u.ph)*u.r;b.position.set(x,gy(x,z)+2.1,z);});
 dragons.forEach(function(g2){var u=g2.userData;g2.position.set(pondX+Math.cos(t*1.2+u.ph)*u.r,pondY+1.4+Math.sin(t*3+u.ph)*0.3,pondZ+Math.sin(t*1.4+u.ph)*u.r);});
 birds.forEach(function(bd){var u=bd.userData;u.ph+=0.003;bd.position.set(Math.cos(u.ph)*60,u.h+Math.sin(u.ph*3)*2,Math.sin(u.ph)*60-20);});
 var pa=pollen.geometry.attributes.position;for(var i=0;i<pa.count;i++){pa.setY(i,pa.getY(i)+0.012);if(pa.getY(i)>15)pa.setY(i,0);pa.setX(i,pa.getX(i)+Math.sin(t*0.5+i)*0.006);}pa.needsUpdate=true;fireflies.geometry.attributes.position.needsUpdate=true;
 animal.t+=0.016;animal.retarget-=0.016;var lp=LOCPOS[curLoc]||[0,2];
 if(animal.action==='forage'){if(animal.retarget<=0){animal.tx=lp[0]+rnd(-6,6);animal.tz=lp[1]+rnd(-4,4);animal.retarget=rnd(1.6,3.2);}}
 else if(animal.action==='hunt'){prey.x+=Math.sin(t*2.2)*0.05;prey.z-=0.05;animal.tx=prey.x;animal.tz=prey.z+2.4;}
 else{animal.tx=lp[0];animal.tz=lp[1];}
 var dx=animal.tx-animal.x,dz=animal.tz-animal.z;var dist=Math.hypot(dx,dz);animal.x+=dx*0.045;animal.z+=dz*0.045;
 var moving=dist>0.25;if(moving)animal.heading+=(Math.atan2(dx,dz)-animal.heading)*0.15;
 if(animalRig){placeRig(animalRig,animal.x,animal.z,animal.heading,0);pose(animalRig,animal.action,t,moving);}
 if(preyRig.root.visible){preyRig.root.position.set(prey.x,gy(prey.x,prey.z),prey.z);preyRig.root.rotation.y=3.14;pose(preyRig,'move',t*1.3,true);}
 var gA=gy(animal.x,animal.z);shadowSp.position.set(animal.x,gA+0.06,animal.z);var ss=(SPECS[animal.species]||SPECS.rabbit).scale*2.6;shadowSp.scale.set(ss*0.7,ss*0.7,1);
 sun.target.position.set(animal.x,0,animal.z);
 critters.forEach(function(r){var u=r.ud;u.rt-=0.016;if(u.rt<=0){u.tx=u.x+rnd(-8,8);u.tz=u.z+rnd(-6,6);u.rt=rnd(2,5);}var ddx=u.tx-u.x,ddz=u.tz-u.z;u.x+=ddx*0.01;u.z+=ddz*0.01;var mv=Math.hypot(ddx,ddz)>0.3;placeRig(r,u.x,u.z,Math.atan2(ddx,ddz),0);pose(r,mv?'move':'forage',t+u.ph,mv);});
 otherRigs.forEach(function(r){var u=r.ud;u.rt-=0.016;if(u.rt<=0){u.tx=u.x+rnd(-6,6);u.tz=u.z+rnd(-5,5);u.rt=rnd(2,5);}var ox2=u.tx-u.x,oz2=u.tz-u.z;u.x+=ox2*0.012;u.z+=oz2*0.012;var omv=Math.hypot(ox2,oz2)>0.3;placeRig(r,u.x,u.z,Math.atan2(ox2,oz2),0);pose(r,omv?'move':'forage',t+u.ph,omv);});
 camera.position.x+=((animal.x*0.5)-camera.position.x)*0.04;camera.position.z+=((animal.z+18)-camera.position.z)*0.03;camera.position.y+=(7.0-camera.position.y)*0.03;var cgy=gy(camera.position.x,camera.position.z);if(camera.position.y<cgy+3.6)camera.position.y=cgy+3.6;camera.lookAt(animal.x,2.6,animal.z);
 if(composer)composer.render();else renderer.render(scene,camera);}
function resize(){renderer.setSize(innerWidth,innerHeight,false);if(composer)composer.setSize(innerWidth,innerHeight);if(grade)grade.uniforms.res.value.set(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();tick();
}catch(e){document.getElementById('err').textContent=e.message;}
</script>
</body></html>
